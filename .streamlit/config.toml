[client]
showErrorDetails = false

[logger]
level = "info"

[server]
port = 8502
headless = true
runOnSave = true
enableXsrfProtection = false
maxUploadSize = 200
enableCORS = false

[theme]
base = "dark"
primaryColor = "#FF6B6B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B22"
textColor = "#E6EAED"
font = "sans serif"

[browser]
gatherUsageStats = false
